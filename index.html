  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAF7;
      --bg-warm: #F5F0EB;
      --text-dark: #1B1919;
      --text-muted: #6B6462;
      --accent: #BF9B76;
      --accent-dark: #937463;
      --accent-light: #E4C39E;
      --cream: #F9EACF;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Decorative background shapes */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191,155,118,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -15%;
      left: -10%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(228,195,158,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 720px;
      width: 100%;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    /* Logo */
    .logo {
      opacity: 0;
      margin-bottom: 48px;
    }

    .logo svg {
      width: 180px;
      height: auto;
    }

    /* Sloth container */
    .sloth-wrapper {
      position: relative;
      margin-bottom: 48px;
    }

    .sloth-wrapper svg {
      width: 320px;
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(147,116,99,0.15));
    }

    .sloth-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(191,155,118,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }

    /* Heading */
    .heading {
      font-family: 'Comic Neue', 'Comic Sans MS', cursive;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.1;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .heading .char {
      display: inline-block;
      opacity: 0;
    }

    .heading .space {
      width: 0.3em;
      display: inline-block;
    }

    /* Tagline */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-muted);
      font-weight: 300;
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 40px;
      opacity: 0;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 2px;
      margin-bottom: 40px;
      opacity: 0;
    }


    /* LinkedIn link */
    .linkedin-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1.5px solid var(--accent);
      border-radius: 50px;
      color: var(--text-dark);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      opacity: 0;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .linkedin-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .linkedin-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Footer */
    .footer {
      margin-top: 60px;
      font-size: 0.8rem;
      color: #B5AFA9;
      opacity: 0;
      letter-spacing: 0.5px;
    }

    /* Floating dots decoration */
    .dot {
      position: fixed;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
    }

    .dot-1 { width: 6px; height: 6px; top: 15%; left: 10%; }
    .dot-2 { width: 4px; height: 4px; top: 25%; right: 15%; }
    .dot-3 { width: 8px; height: 8px; bottom: 20%; left: 20%; }
    .dot-4 { width: 5px; height: 5px; bottom: 30%; right: 10%; }
    .dot-5 { width: 3px; height: 3px; top: 40%; left: 5%; }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 32px 20px;
      }

      .sloth-wrapper svg {
        width: 240px;
      }

.logo {
        margin-bottom: 32px;
      }

      .sloth-wrapper {
        margin-bottom: 36px;
      }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Split "Coming Soon" into individual characters
    const headingEl = document.getElementById('heading');
    const text = 'Coming Soon';
    text.split('').forEach(char => {
      if (char === ' ') {
        headingEl.innerHTML += '<span class="space"></span>';
      } else {
        headingEl.innerHTML += `<span class="char">${char}</span>`;
      }
    });

    // Master timeline
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // 1. Logo entrance
    tl.to('.logo', {
      opacity: 1,
      y: 0,
      duration: 0.8,
      delay: 0.3
    });

    // 2. Sloth SVG — smooth entrance
    tl.from('.sloth-wrapper', {
      opacity: 0,
      scale: 0.9,
      y: 40,
      duration: 1.2,
      ease: 'back.out(1.4)'
    }, '-=0.3');

    // 3. Heading letters stagger
    tl.to('.heading .char', {
      opacity: 1,
      y: 0,
      duration: 0.5,
      stagger: 0.04,
      ease: 'back.out(2)'
    }, '-=0.2');

    // Set initial state for chars
    gsap.set('.heading .char', { y: 40, opacity: 0 });
    gsap.set('.logo', { y: -20 });

    // 4. Divider
    tl.to('.divider', {
      opacity: 1,
      scaleX: 1,
      duration: 0.6
    }, '-=0.2');
    gsap.set('.divider', { scaleX: 0 });

    // 5. Tagline
    tl.to('.tagline', {
      opacity: 1,
      y: 0,
      duration: 0.6
    }, '-=0.3');
    gsap.set('.tagline', { y: 15 });

    // 6. LinkedIn link
    tl.to('.linkedin-link', {
      opacity: 1,
      y: 0,
      duration: 0.5
    }, '-=0.2');
    gsap.set('.linkedin-link', { y: 10 });

    // 7. Footer
    tl.to('.footer', {
      opacity: 1,
      duration: 0.5
    }, '-=0.2');

    // === Continuous Animations ===

    // Sloth floating / bobbing
    gsap.to('.sloth-wrapper', {
      y: -12,
      duration: 3,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1
    });

    // Subtle rotation sway
    gsap.to('#sloth', {
      rotation: 1.5,
      duration: 4,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1,
      transformOrigin: '50% 10%'
    });

    // Eye blink (scale the eye area)
    gsap.to('.sloth-cheeks', {
      scaleY: 0.9,
      duration: 0.15,
      ease: 'power2.inOut',
      yoyo: true,
      repeat: -1,
      repeatDelay: 3.5,
      transformOrigin: '50% 50%'
    });

    // Floating dots
    document.querySelectorAll('.dot').forEach((dot, i) => {
      gsap.to(dot, {
        opacity: 0.15 + Math.random() * 0.2,
        duration: 1,
        delay: 1 + i * 0.3
      });

      gsap.to(dot, {
        y: -20 + Math.random() * 40,
        x: -10 + Math.random() * 20,
        duration: 3 + Math.random() * 3,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1,
        delay: Math.random() * 2
      });
    });

    // Glow pulse
    gsap.to('.sloth-glow', {
      scale: 1.15,
      opacity: 0.7,
      duration: 3,
      ease: 'sine.inOut',
      yoyo: true,
      repeat: -1
    });

  </script>
</body>
</html>
